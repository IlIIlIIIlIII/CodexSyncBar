name: Release macOS app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout tagged commit
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach FETCH_HEAD

      - name: Verify source
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          swift --version
          if ! command -v lockf >/dev/null && ! command -v flock >/dev/null; then
            brew install util-linux
            echo "$(brew --prefix util-linux)/bin" >> "$GITHUB_PATH"
            export PATH="$(brew --prefix util-linux)/bin:$PATH"
          fi
          bash Tests/helper-contract-tests.sh
          swift test

      - name: Build universal app
        run: |
          CODEX_SYNCBAR_UNIVERSAL=1 ./build-app.sh "$PWD/release-assets"
          version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)
          test "v$version" = "$GITHUB_REF_NAME"
          mv "release-assets/Codex SyncBar.zip" \
            "release-assets/Codex-SyncBar-$version-macOS-universal.zip"
          cd release-assets
          shasum -a 256 "Codex-SyncBar-$version-macOS-universal.zip" > SHA256SUMS
          cd ..
          lipo -archs "release-assets/Codex SyncBar.app/Contents/MacOS/CodexSyncBar" \
            | grep -q 'x86_64 arm64\|arm64 x86_64'
          test "$(stat -f '%Lp' 'release-assets/Codex SyncBar.app/Contents/Resources/codex-syncbar-askpass')" = 700
          codesign --verify --deep --strict --verbose=2 "release-assets/Codex SyncBar.app"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "release-assets/Codex-SyncBar-$version-macOS-universal.zip" \
            "release-assets/SHA256SUMS" \
            --title "Codex SyncBar $version" \
            --notes-file "docs/releases/$GITHUB_REF_NAME.md" \
            --verify-tag

      - name: Remove pre-1.0 release history
        if: github.ref_name == 'v1.0.0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete v2.3.3 --cleanup-tag --yes
